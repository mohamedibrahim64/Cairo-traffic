{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="page-title"><i class="fas fa-brain"></i> Traffic Prediction</h1>

    <div class="row">
        <div class="col-lg-6">
            <div class="card mb-4">
                <div class="card-header"><h5 class="mb-0">Prediction Inputs</h5></div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Hour</label><input id="pred-hour" type="number" class="form-control" value="8" min="0" max="23"></div>
                        <div class="col-md-4"><label class="form-label">Day Type</label><select id="pred-day" class="form-select"><option value="weekday">Weekday</option><option value="weekend">Weekend</option></select></div>
                        <div class="col-md-4"><label class="form-label">Road ID</label><input id="pred-road" class="form-control" value="1-3"></div>
                    </div>
                    <button id="predict-btn" class="btn btn-dark mt-3">Predict Traffic</button>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card mb-4">
                <div class="card-header"><h5 class="mb-0">Prediction Output</h5></div>
                <div class="card-body">
                    <div id="prediction-output" class="alert alert-secondary mb-0">Run a prediction to see the forecast.</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Model Status</h5></div>
                <div class="card-body">
                    <div id="ml-status">Checking model state...</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('predict-btn').addEventListener('click', predictTraffic);

    try {
        const response = await fetch('/api/ml-status');
        const status = await response.json();
        document.getElementById('ml-status').textContent = status.trained
            ? `Predictor trained with models: ${status.models.join(', ')}`
            : 'Predictor is not trained yet.';
    } catch (error) {
        document.getElementById('ml-status').textContent = 'Unable to read model status.';
    }
});

async function predictTraffic() {
    const hour = parseInt(document.getElementById('pred-hour').value, 10);
    const dayType = document.getElementById('pred-day').value;
    const roadId = document.getElementById('pred-road').value;

    const result = await api.predictTraffic(hour, dayType, roadId);
    const output = document.getElementById('prediction-output');

    if (!result.success) {
        output.className = 'alert alert-danger mb-0';
        output.textContent = result.error || 'Prediction failed.';
        return;
    }

    output.className = 'alert alert-success mb-0';
    output.innerHTML = `<strong>Predicted traffic:</strong> ${Number(result.prediction).toFixed(0)} vehicles for road ${result.road_id} at hour ${result.hour}.`;
}
</script>
{% endblock %}
